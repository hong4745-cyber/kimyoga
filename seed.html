      { category:'공지',   title:'필라테스 기구반 소규모 정원제 운영 변경 안내',               createdAt: new Date('2026-04-22').getTime(), views:188 },

      { title:'전문지도자 과정 수료 후 강사로 활동 중!', rating:5, authorName:'이*현',

      { title:'빈야사 수업이 예상보다 훨씬 재밌어요', rating:4, authorName:'최*미',
        createdAt: new Date('2026-05-22').getTime(),
        content:'요가를 처음 배우는데 빈야사 입문반부터 시작했어요. 강사님이 초보자도 쉽게 따라할 수 있게 단계별로 가르쳐주시고 분위기도 화기애애해서 매주 기다려집니다. 시설도 깔끔하고 접근성이 좋아서 만족합니다.' },
      { title:'임산부 요가 — 안전하게 잘 배웠습니다', rating:5, authorName:'정*서',
        createdAt: new Date('2026-05-14').getTime(),
        content:'임신 5개월부터 출산 전까지 임산부 요가를 받았어요. 강사님이 산전·산후 전문 자격을 갖추셔서 불안 없이 다닐 수 있었습니다. 순산에 도움이 됐다고 생각해요. 아이 낳고 나서도 꼭 다시 등록하러 올게요.' },
      { title:'소도구 필라테스로 코어가 살아났어요', rating:5, authorName:'한*우',
        createdAt: new Date('2026-05-05').getTime(),
        content:'앉아서 일하는 직업이라 허리·골반 통증이 심했는데 소도구 필라테스 수업 두 달 만에 확연히 나아졌습니다. 폼롤러와 밴드를 활용한 동작들이 집에서도 따라할 수 있어서 일상 루틴으로 굳혀가고 있어요.' }
    ];

    var NEWS = [
      { title:'\'요가와 명상으로 찾는 나의 균형\' — KIM\'S 건강 세미나 개최',
        createdAt: new Date('2026-05-02').getTime(),
        content:'KIM\'S YOGA & PILATES는 오는 7월 5일(토) 안산 본점에서 \'요가와 명상으로 찾는 나의 균형\'을 주제로 건강 세미나를 개최한다. 요가 전문 강사와 명상 코치가 함께하는 이 행사는 무료로 진행될 예정이다.' },
      { title:'안양 평촌점 그랜드 오픈 기념 이벤트 성황리 마무리',
        createdAt: new Date('2026-05-18').getTime(),
        content:'5월 17일 리모델링을 마친 안양 평촌점의 그랜드 오픈 행사가 성황리에 마무리됐다. 이날 행사에는 100여 명이 방문해 무료 체험 클래스와 경품 행사를 즐겼다.' },
      { title:'2026 전국 요가 지도자 대회 — KIM\'S 수료생 3인 수상',
        createdAt: new Date('2026-05-28').getTime(),
        content:'한국요가지도자협회가 주최한 2026 전국 요가 지도자 대회에서 KIM\'S YOGA & PILATES 출신 수료생 3명이 각각 금·은·동메달을 수상했다. 체계적인 지도자 과정의 성과가 결실을 맺었다는 평가다.' },
      { title:'안산 본점 리폼드 필라테스 기구 전면 교체 완료',
        createdAt: new Date('2026-06-10').getTime(),
        content:'안산 본점이 리폼드 필라테스 기구를 최신 모델로 전면 교체했다. 캐딜락·리포머 등 11종의 기구를 새로 들여와 수강생의 운동 효율과 안전성이 한층 강화되었다.' },
      { title:'포토스토리 — 6월 원데이 힐링 요가 클래스 현장',
        createdAt: new Date('2026-06-08').getTime(),
        content:'지난 6월 7일 안산 본점에서 진행된 원데이 힐링 요가 클래스에 30여 명의 수강생이 참여했다. 자연 채광이 가득한 스튜디오에서 진행된 이번 클래스는 만족도 4.9점(5점 만점)을 기록했다.' },
      { title:'KIM\'S YOGA & PILATES, KYA 공인 교육기관 5년 연속 선정',
        createdAt: new Date('2026-06-22').getTime(),
        content:'대한요가기협회(KYA)는 2026년도 공인 교육기관 평가에서 KIM\'S YOGA & PILATES를 5년 연속 공인 교육기관으로 선정했다고 밝혔다. 전문 커리큘럼과 강사진의 우수성이 높은 평가를 받았다.' }
    ];

    document.getElementById('btnSeed').addEventListener('click', function () {
      var btn = this;
      btn.disabled = true;
      log.innerHTML = '';
      print('⏳ 기존 데이터 삭제 중...');

      /* 1. 기존 데이터 삭제 */
      Promise.all([
        db.ref('posts/notice').remove(),
        db.ref('posts/review').remove(),
        db.ref('posts/news').remove()
      ]).then(function () {
        print('✅ 기존 데이터 삭제 완료\n');

        /* 2. 공지사항 입력 */
        print('📌 공지사항 입력 중...');
        var noticePromises = NOTICES.map(function (d) { return db.ref('posts/notice').push(d); });
        return Promise.all(noticePromises);

      }).then(function () {
        print('✅ 공지사항 10건 입력 완료');

        /* 3. 수강생 후기 입력 */
        print('⭐ 수강생 후기 입력 중...');
        var reviewPromises = REVIEWS.map(function (d) { return db.ref('posts/review').push(d); });
        return Promise.all(reviewPromises);

      }).then(function () {
        print('✅ 수강생 후기 6건 입력 완료');

        /* 4. 뉴스 입력 */
        print('📰 뉴스·포토스토리 입력 중...');
        var newsPromises = NEWS.map(function (d) { return db.ref('posts/news').push(d); });
        return Promise.all(newsPromises);

      }).then(function () {
        print('✅ 뉴스·포토스토리 6건 입력 완료\n');
        print('🎉 모든 데이터 입력 완료!\n커뮤니티 페이지를 새로고침하세요.', 'done');
        btn.textContent = '완료';
      }).catch(function (err) {
        print('❌ 오류: ' + err.message, 'err');
        print('\n⚠️ Firebase 규칙에서 쓰기 권한을 허용했는지 확인하세요.', 'err');
        btn.disabled = false;
        btn.textContent = '다시 시도';
      });
    });
  </script>
</body>
